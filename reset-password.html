<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Halo Pet Care</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Initialize Tailwind configuration to match your brand colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#4ade80',
                            DEFAULT: '#22c55e',
                            dark: '#16a34a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6">
        
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-gray-900">Reset Password</h1>
            <p class="text-gray-500" id="status-message">Please enter your new password below.</p>
        </div>

        <!-- The Password Reset Form -->
        <form id="reset-form" class="space-y-4" onsubmit="handleReset(event)">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">New Password</label>
                <input 
                    type="password" 
                    id="password" 
                    required
                    minlength="6"
                    class="mt-1 block w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-brand focus:border-brand transition-colors"
                    placeholder="Enter new password"
                >
            </div>
            
            <button 
                type="submit" 
                id="submit-btn"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-brand hover:bg-brand-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand transition-colors"
            >
                Update Password
            </button>
        </form>

        <!-- Success Message -->
        <div id="success-message" class="hidden text-center space-y-4">
            <div class="w-16 h-16 bg-green-100 text-brand rounded-full flex items-center justify-center mx-auto">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-900">Password Updated!</h2>
            <p class="text-gray-600">Your password has been successfully changed.</p>
            <p class="font-medium text-brand">You can now close this page and log into the Halo Pet Care app.</p>
        </div>

        <!-- Error Message -->
        <div id="error-container" class="hidden p-4 bg-red-50 rounded-xl text-red-600 text-sm text-center"></div>

    </div>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL SUPABASE URL AND ANON KEY
        const SUPABASE_URL = 'https://cxefjiobtummcrwqgnsh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_WbDJzDlaCPyhvzDn56l5HA_anc4TME_';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Elements
        const form = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMessage = document.getElementById('success-message');
        const errorContainer = document.getElementById('error-container');
        const statusMessage = document.getElementById('status-message');

        // Check if there's a recovery token in the URL
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const type = hashParams.get('type');
        const error = hashParams.get('error');
        const errorDescription = hashParams.get('error_description');

        if (error) {
            showError(errorDescription || 'An error occurred.');
            statusMessage.style.display = 'none';
        } else if (type === 'recovery' || window.location.hash.includes('access_token')) {
            // We have a valid recovery token in the URL, show the form
            form.classList.remove('hidden');
        } else {
            // No token found
            statusMessage.textContent = 'Invalid or expired password reset link. Please request a new link from the app.';
        }

        function showError(msg) {
            errorContainer.textContent = msg;
            errorContainer.classList.remove('hidden');
        }

        async function handleReset(event) {
            event.preventDefault();
            const newPassword = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            errorContainer.classList.add('hidden');

            try {
                // Because the URL contains the access_token from the email, 
                // Supabase JS has already established a session implicitly.
                // We just need to update the user's password.
                const { data, error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                // Success!
                form.classList.add('hidden');
                statusMessage.style.display = 'none';
                successMessage.classList.remove('hidden');

            } catch (err) {
                showError(err.message || 'Failed to update password. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
